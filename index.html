<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            text-align: center;
        }

        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            font-size: 1.5rem;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .gallery-item {
            width: 100%;
            height: 120px;
            background-color: #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: #555;
            border-radius: 8px;
        }

        footer {
            margin-top: 30px;
            padding: 10px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>

<body>

<header>
    📸 Gallery
</header>

<div class="gallery-container">
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
    <div class="gallery-item">Image: Gallery</div>
</div>

<footer>
    &copy; Your Gallery Page
</footer>

</body>
</html>
