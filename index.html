<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyTube</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        /* Top Navbar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: red;
        }

        .search-bar input {
            padding: 8px;
            width: 400px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        .profile {
            font-size: 18px;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 60px;
            left: 0;
            width: 200px;
            height: 100%;
            background-color: white;
            padding-top: 20px;
            border-right: 1px solid #ddd;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: black;
        }

        .sidebar a:hover {
            background-color: #eee;
        }

        /* Main Content */
        .content {
            margin-left: 220px;
            margin-top: 80px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .video-card:hover {
            transform: scale(1.05);
        }

        .thumbnail {
            width: 100%;
            height: 150px;
            background-color: #ccc;
        }

        .video-info {
            padding: 10px;
        }

        .video-title {
            font-weight: bold;
            font-size: 14px;
        }

        .channel-name {
            font-size: 12px;
            color: gray;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-bar input {
                width: 200px;
            }

            .sidebar {
                width: 150px;
            }

            .content {
                margin-left: 170px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">MyTube</div>
        <div class="search-bar">
            <input type="text" placeholder="Search">
        </div>
        <div class="profile">👤</div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="#">🏠 Home</a>
        <a href="#">🔥 Trending</a>
        <a href="#">📺 Subscriptions</a>
        <a href="#">📚 Library</a>
    </div>

    <!-- Main Content -->
    <div class="content">

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <div class="video-title">How to Build a Website</div>
                <div class="channel-name">Code Channel • 1M views</div>
            </div>
        </div>

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <div class="video-title">Learn HTML in 10 Minutes</div>
                <div class="channel-name">Dev Academy • 500K views</div>
            </div>
        </div>

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <div class="video-title">CSS Grid Explained</div>
                <div class="channel-name">Web Master • 300K views</div>
            </div>
        </div>

    </div>

</body>
</html>
